<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Gradient background for the profile circle -->
  <defs>
    <linearGradient id="profileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff" />
      <stop offset="100%" stop-color="#4a418c" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="200" cy="200" r="190" fill="#1e1e1e" stroke="url(#profileGradient)" stroke-width="10" />
  
  <!-- Abstract person silhouette -->
  <path d="M200 100 Q240 100 260 140 Q280 180 260 220 Q240 260 200 260 Q160 260 140 220 Q120 180 140 140 Q160 100 200 100Z" fill="#333" />
  <circle cx="200" cy="150" r="50" fill="#333" />
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Glowing effect -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="#6c63ff" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="195;200;195" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>