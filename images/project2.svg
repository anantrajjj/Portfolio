<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Project 2 illustration: Mobile App -->
  <rect width="400" height="300" rx="10" fill="#1e1e1e" />
  
  <!-- Phone outline -->
  <rect x="125" y="20" width="150" height="260" rx="20" fill="#333" />
  <rect x="130" y="25" width="140" height="250" rx="18" fill="#222" />
  
  <!-- Phone notch -->
  <rect x="165" y="25" width="70" height="15" rx="8" fill="#333" />
  
  <!-- App interface -->
  <rect x="140" y="45" width="120" height="210" rx="2" fill="#111" />
  
  <!-- Status bar -->
  <rect x="140" y="45" width="120" height="20" fill="#1a1a1a" />
  <circle cx="150" cy="55" r="3" fill="#6c63ff" />
  <rect x="230" y="52" width="20" height="6" rx="3" fill="#fff" opacity="0.5" />
  
  <!-- App header -->
  <rect x="140" y="65" width="120" height="40" fill="#6c63ff" opacity="0.8" />
  <rect x="150" y="80" width="70" height="10" rx="2" fill="#fff" opacity="0.9" />
  
  <!-- App content -->
  <rect x="150" y="115" width="100" height="15" rx="2" fill="#444" />
  <rect x="150" y="135" width="80" height="8" rx="2" fill="#333" />
  <rect x="150" y="148" width="90" height="8" rx="2" fill="#333" />
  
  <!-- App card -->
  <rect x="150" y="170" width="100" height="60" rx="5" fill="#2a2a2a" />
  <rect x="160" y="180" width="80" height="30" rx="2" fill="#333" />
  <rect x="160" y="215" width="50" height="5" rx="1" fill="#6c63ff" opacity="0.6" />
  
  <!-- Bottom navigation -->
  <rect x="140" y="235" width="120" height="20" fill="#1a1a1a" />
  <circle cx="165" cy="245" r="5" fill="#6c63ff" />
  <circle cx="200" cy="245" r="5" fill="#444" />
  <circle cx="235" cy="245" r="5" fill="#444" />
</svg>