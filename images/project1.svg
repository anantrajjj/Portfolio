<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Project 1 illustration: Web Application -->
  <rect width="400" height="300" rx="10" fill="#1e1e1e" />
  
  <!-- Browser window frame -->
  <rect x="20" y="20" width="360" height="260" rx="5" fill="#333" />
  <rect x="20" y="20" width="360" height="30" rx="5" fill="#444" />
  
  <!-- Browser controls -->
  <circle cx="35" cy="35" r="5" fill="#ff5f57" />
  <circle cx="55" cy="35" r="5" fill="#ffbd2e" />
  <circle cx="75" cy="35" r="5" fill="#28ca41" />
  
  <!-- Address bar -->
  <rect x="95" y="25" width="265" height="20" rx="3" fill="#222" />
  
  <!-- Content area -->
  <rect x="30" y="60" width="340" height="210" rx="3" fill="#222" />
  
  <!-- Navigation sidebar -->
  <rect x="30" y="60" width="80" height="210" fill="#2a2a2a" />
  
  <!-- Nav items -->
  <rect x="40" y="80" width="60" height="10" rx="2" fill="#6c63ff" />
  <rect x="40" y="100" width="60" height="10" rx="2" fill="#444" />
  <rect x="40" y="120" width="60" height="10" rx="2" fill="#444" />
  <rect x="40" y="140" width="60" height="10" rx="2" fill="#444" />
  
  <!-- Main content -->
  <rect x="130" y="80" width="220" height="30" rx="2" fill="#6c63ff" opacity="0.8" />
  <rect x="130" y="120" width="220" height="10" rx="2" fill="#444" />
  <rect x="130" y="140" width="180" height="10" rx="2" fill="#444" />
  <rect x="130" y="160" width="200" height="10" rx="2" fill="#444" />
  
  <!-- Cards/Widgets -->
  <rect x="130" y="190" width="100" height="70" rx="3" fill="#2a2a2a" />
  <rect x="250" y="190" width="100" height="70" rx="3" fill="#2a2a2a" />
  
  <!-- Card content -->
  <rect x="140" y="200" width="80" height="40" rx="2" fill="#333" />
  <rect x="140" y="250" width="60" height="5" rx="1" fill="#6c63ff" opacity="0.6" />
  
  <rect x="260" y="200" width="80" height="40" rx="2" fill="#333" />
  <rect x="260" y="250" width="60" height="5" rx="1" fill="#6c63ff" opacity="0.6" />
</svg>