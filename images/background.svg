<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <!-- Background pattern for the hero section -->
  <defs>
    <!-- Gradient for the dots -->
    <radialGradient id="dotGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0" />
    </radialGradient>
    
    <!-- Pattern definition -->
    <pattern id="dotPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="2" fill="#6c63ff" opacity="0.3" />
    </pattern>
    
    <!-- Larger dots pattern -->
    <pattern id="largeDotPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="4" fill="#6c63ff" opacity="0.4" />
    </pattern>
  </defs>
  
  <!-- Base layer with small dots -->
  <rect width="100%" height="100%" fill="url(#dotPattern)" />
  
  <!-- Layer with larger dots -->
  <rect width="100%" height="100%" fill="url(#largeDotPattern)" />
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="100" fill="url(#dotGradient)" opacity="0.1" />
  <circle cx="800" cy="800" r="150" fill="url(#dotGradient)" opacity="0.1" />
  <circle cx="100" cy="900" r="80" fill="url(#dotGradient)" opacity="0.1" />
  <circle cx="900" cy="100" r="120" fill="url(#dotGradient)" opacity="0.1" />
  
  <!-- Abstract shapes -->
  <path d="M0 300 Q 250 150 500 300 T 1000 300" fill="none" stroke="#4a418c" stroke-width="1" opacity="0.2" />
  <path d="M0 600 Q 250 450 500 600 T 1000 600" fill="none" stroke="#4a418c" stroke-width="1" opacity="0.2" />
  <path d="M0 900 Q 250 750 500 900 T 1000 900" fill="none" stroke="#4a418c" stroke-width="1" opacity="0.2" />
</svg>